spring:
  application:
    name: product-search
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      max-poll-records: 1000
      properties:
        spring.json.use.type.headers: false
    listener:
      type: batch
      ack-mode: batch

server:
  port: ${SERVER_PORT:8081}

opensearch:
  uri: ${OPENSEARCH_URI:http://localhost:9200}

# Topik Debezium (prefix.schema.table)
cdc:
  topic:
    categories: pzn.public.categories
    brands: pzn.public.brands
    products: pzn.public.products

management:
  endpoints:
    web:
      exposure:
        include: health,info
