# Orkestrasi seluruh project (product-backend + nanti FE, dll).
#   docker compose up --build        (atau: podman compose up --build)
#
# Layanan saat ini:
#   - postgres        : database PostgreSQL
#   - product-backend : REST API (http://localhost:8080, Swagger /swagger-ui.html)
services:
  postgres:
    image: postgres:17-alpine
    container_name: product-postgres
    environment:
      POSTGRES_DB: product
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product"]
      interval: 5s
      timeout: 5s
      retries: 10

  product-backend:
    build:
      context: ./product-backend
    container_name: product-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/product
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"

  # Nanti tambahkan service lain di sini, contoh:
  # product-frontend:
  #   build:
  #     context: ./product-frontend
  #   depends_on:
  #     - product-backend
  #   ports:
  #     - "3000:3000"

volumes:
  postgres-data:
